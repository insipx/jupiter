name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/insipx/jupiter

jobs:
  build-and-push-images:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        image:
          - name: rathole-server
            attr: rathole-server-image
          - name: rathole-client
            attr: rathole-client-image
          - name: kasa-prometheus
            attr: kasa-prometheus-image
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v30
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            extra-substituters = https://insipx.cachix.org https://nix-community.cachix.org
            extra-trusted-public-keys = insipx.cachix.org-1:JMvQq3zItXN5AO7VfPUAILAwMXQrzQ78rLoQTktWs14= nix-community.cachix.org-1:mB9FSh9qf2dCimDSUo8Zy7bkq5CX+/rkCWyvRCYg3Fs=
            access-tokens = github.com=${{ secrets.SECRETS_PAT }}

      - uses: cachix/cachix-action@v15
        with:
          name: insipx
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'

      - name: Build ${{ matrix.image.name }} image
        run: |
          nix build .#${{ matrix.image.attr }} --print-out-paths > image-path.txt

      - name: Log in to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push ${{ matrix.image.name }} to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          IMAGE_PATH=$(cat image-path.txt)
          docker load < "$IMAGE_PATH"
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          docker tag ${{ matrix.image.name }}:latest ${{ env.IMAGE_PREFIX }}/${{ matrix.image.name }}:latest
          docker tag ${{ matrix.image.name }}:latest ${{ env.IMAGE_PREFIX }}/${{ matrix.image.name }}:$SHORT_SHA
          docker push ${{ env.IMAGE_PREFIX }}/${{ matrix.image.name }}:latest
          docker push ${{ env.IMAGE_PREFIX }}/${{ matrix.image.name }}:$SHORT_SHA
